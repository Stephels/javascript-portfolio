<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/CSS/app.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chef's Favorite Meals App</title>
  </head>
  <body id="app-body">
    <div class="slideshow">
      <div class="slide slide1"></div>
      <div class="slide slide2"></div>
      <div class="slide slide3"></div>
      <div class="slide slide4"></div>
      <div class="slide slide5"></div>
      <div class="slide slide6"></div>
    </div>
    <header id="app-header">
      <div class="return-btn">&larr;</div>
      <div class="logo">
        <img src="/Images/App Images/CFM.png" alt="cfm-logo" />
      </div>
      <h1>Chef's Favorite Meals</h1>
      <span class="custom-line-container"></span>
    </header>
    <main>
      <div class="instructions">
        <p class="instruction hidden">
          Place an order based on your ingredients.
        </p>
        <p class="instruction hidden">
          View incomplete orders and mark them as complete.
        </p>
        <p class="instruction hidden">"Exit" the application via the promt.</p>
      </div>
      <div class="button-container">
        <button class="start-btn">Start</button>
      </div>
    </main>
    <script src="/JS/app.js"></script>
  </body>
</html>
